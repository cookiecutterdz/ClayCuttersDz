<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClayCuttersDz — Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

/* _DC peuplé après </body> par les blocs <script> individuels */

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fdf9f5;--card:#fff;--border:#f0e8df;--border2:#e8d8cc;--text:#3a2e28;--text2:#7a6a62;--text3:#b0a098;--peach:#f4a97c;--peach-light:#fde8d8;--peach-mid:#f9d4bc;--peach-dark:#e8845a;--green:#4caf7d;--green-bg:#e8f7ee;--check:#c9735a;--radius:18px;--radius-sm:12px;--font-head:"Fraunces",Georgia,serif;--font-body:"Nunito",system-ui,sans-serif;}
html,body{min-height:100vh;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
header{padding:40px 24px 28px;text-align:center;background:var(--bg)}
.shop-logo{font-family:var(--font-head);font-size:clamp(24px,5vw,40px);font-weight:800;color:var(--text);letter-spacing:-.01em;margin-bottom:6px}
.shop-tagline{font-size:13px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;font-weight:600}
.divider{width:50px;height:3px;background:var(--peach);border-radius:2px;margin:14px auto 0}
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:0 24px 20px;max-width:1200px;margin:0 auto}
.filter-bar input,.filter-bar select{padding:10px 16px;background:#fff;border:1.5px solid var(--border2);border-radius:30px;color:var(--text);font-family:var(--font-body);font-size:13px;font-weight:500;outline:none;transition:border-color .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--peach)}
.filter-bar input{flex:1;min-width:180px}
.filter-bar select option{background:#fff}
.selection-bar{display:none;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 24px;max-width:1200px;margin:0 auto 4px;background:#fff;border:1.5px solid var(--peach-mid);border-radius:16px;box-shadow:0 2px 12px rgba(200,110,80,.08)}
.selection-bar.visible{display:flex}
.sel-count{font-size:14px;font-weight:700;color:var(--check);flex:1}
.btn-order-sel{padding:10px 22px;background:var(--peach);border:none;border-radius:30px;color:#fff;font-family:var(--font-body);font-size:13px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;box-shadow:0 2px 8px rgba(200,110,80,.3)}
.btn-order-sel:hover{background:var(--peach-dark);transform:translateY(-1px)}
.btn-clear-sel{padding:8px 16px;background:transparent;border:1.5px solid var(--border2);border-radius:30px;color:var(--text2);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-clear-sel:hover{border-color:var(--peach);color:var(--peach)}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(240px,100%),1fr));gap:20px;padding:0 24px 60px;max-width:1200px;margin:0 auto}
.product-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .22s,border-color .22s,box-shadow .22s;position:relative;cursor:pointer}
.product-card:hover{transform:translateY(-3px);border-color:var(--peach-mid);box-shadow:0 8px 28px rgba(200,110,80,.12)}
.product-card.selected{border-color:var(--peach);box-shadow:0 4px 20px rgba(200,110,80,.2)}
.card-check-wrap{position:absolute;top:12px;left:12px;z-index:10}
.card-checkbox{appearance:none;-webkit-appearance:none;width:24px;height:24px;border-radius:8px;border:2px solid rgba(255,255,255,.9);background:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
.card-checkbox:checked{background:var(--check);border-color:var(--check)}
.card-checkbox:checked::after{content:"✓";position:absolute;color:#fff;font-size:13px;font-weight:800;line-height:1;margin-top:1px}
.product-thumb{height:190px;background:linear-gradient(160deg,var(--peach-light) 0%,var(--peach-mid) 100%);position:relative;overflow:hidden}
.product-thumb canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}
.thumb-drag-hint{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(60,20,0,.55));color:rgba(255,255,255,.85);font-size:10px;font-weight:600;text-align:center;padding:10px 0 7px;letter-spacing:.06em;pointer-events:none;opacity:0;transition:opacity .2s}
.product-card:hover .thumb-drag-hint{opacity:1}
.thumb-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;color:rgba(200,110,80,.35)}
.thumb-badge{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.85);border-radius:8px;padding:3px 9px;font-size:10px;font-weight:700;color:var(--check);letter-spacing:.04em;backdrop-filter:blur(4px)}
.product-body{padding:14px 16px 16px}
.product-name{font-family:var(--font-head);font-size:17px;font-weight:800;color:var(--text);margin-bottom:5px;line-height:1.2;letter-spacing:-.01em}
.product-dims{font-size:15px;color:#000;margin-bottom:10px;font-weight:600;letter-spacing:.03em;display:flex;align-items:center;gap:5px}
.dims-icon{font-size:11px;opacity:.7}
.product-price{font-size:20px;font-weight:800;color:var(--peach-dark);margin-bottom:12px;letter-spacing:-.01em}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag-chip{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:var(--peach-light);color:var(--peach-dark);letter-spacing:.04em}
.btn-row{display:flex;gap:8px}
.btn-wa{flex:1;padding:10px 10px;background:var(--peach);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-family:var(--font-body);cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s,transform .1s;box-shadow:0 2px 8px rgba(200,110,80,.25)}
.btn-wa:hover{background:var(--peach-dark);transform:translateY(-1px)}
.btn-3d{padding:10px 12px;background:#fff;border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:12px;font-family:var(--font-body);cursor:pointer;transition:all .15s;font-weight:600}
.btn-3d:hover{border-color:var(--peach);color:var(--peach-dark)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(40,20,10,.65);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:mIn .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.2)}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:none}}
.modal-header{padding:18px 20px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-name{font-family:var(--font-head);font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.modal-close{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;border-radius:8px;padding:2px 8px;transition:color .15s}
.modal-close:hover{color:var(--text)}
#modal-canvas{width:100%;height:340px;display:block;background:linear-gradient(160deg,var(--peach-light),var(--peach-mid))}
.modal-foot{padding:14px 20px;border-top:1.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end;align-items:center}
.modal-price{font-size:22px;font-weight:800;color:var(--peach-dark);flex:1}
.order-form{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-top:0}
.order-form-title{font-family:var(--font-head);font-size:16px;font-weight:800;color:var(--text);margin-bottom:12px;letter-spacing:-.01em}
.order-form input,.order-form textarea,.order-form select{width:100%;padding:9px 12px;background:#fff;border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:13px;font-family:var(--font-body);outline:none;margin-bottom:8px;transition:border-color .2s}
.order-form input:focus,.order-form textarea:focus{border-color:var(--peach)}
.order-form textarea{resize:vertical;min-height:60px}
.btn-send{width:100%;padding:11px;background:var(--peach);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:background .15s}
.btn-send:hover{background:var(--peach-dark)}
.order-section{padding:16px 20px;border-top:1.5px solid var(--border)}
.multi-order-modal{display:none;position:fixed;inset:0;background:rgba(40,20,10,.65);z-index:2000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.multi-order-modal.open{display:flex}
.multi-modal-box{background:#fff;border-radius:var(--radius);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s ease}
.multi-modal-header{padding:18px 20px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.multi-modal-title{font-family:var(--font-head);font-size:19px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.multi-items-list{padding:12px 20px;max-height:260px;overflow-y:auto}
.multi-item-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.multi-item-row:last-child{border-bottom:none}
.multi-item-thumb{width:54px;height:54px;border-radius:10px;background:linear-gradient(135deg,var(--peach-light),var(--peach-mid));flex-shrink:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--peach-dark)}
.multi-item-thumb canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;display:block}
.multi-item-info{flex:1;min-width:0}
.multi-item-name{font-weight:700;color:var(--text);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.multi-item-price{color:var(--peach-dark);font-weight:700;font-size:12px;margin-top:2px}
.multi-item-qty{width:52px;padding:4px 8px;border:1.5px solid var(--border2);border-radius:8px;font-size:12px;font-family:var(--font-body);outline:none;text-align:center;color:var(--text)}
.multi-item-qty:focus{border-color:var(--peach)}
.order-preview-strip{display:flex;align-items:center;gap:14px;padding:14px 20px;background:var(--peach-light);border-bottom:1.5px solid var(--peach-mid)}
.order-preview-thumb{width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,var(--peach-mid),var(--peach-dark));flex-shrink:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff}
.order-preview-thumb canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;display:block}
.order-preview-info{flex:1;min-width:0}
.order-preview-name{font-family:var(--font-head);font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-preview-dims{font-size:12px;color:var(--text2);margin-top:2px}
.order-preview-price{font-size:17px;font-weight:800;color:var(--peach-dark);margin-top:3px}
.order-qty-row{display:flex;align-items:center;gap:8px;flex-shrink:0}
.order-qty-label{font-size:12px;color:var(--text2);font-weight:600}
.order-qty-input{width:58px;padding:6px 8px;border:1.5px solid var(--border2);border-radius:10px;font-size:14px;font-family:var(--font-body);font-weight:700;text-align:center;outline:none;color:var(--text);background:#fff}
.order-qty-input:focus{border-color:var(--peach)}
.order-preview-strip{display:none}
.multi-form{padding:0 20px 16px}
footer{padding:24px;text-align:center;border-top:1.5px solid var(--border);font-size:11px;color:var(--text3);letter-spacing:.08em}
@media(max-width:480px){.products-grid{padding:0 12px 40px;gap:14px}.product-card{border-radius:14px}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--peach-mid);border-radius:4px}
.cart-bubble{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);z-index:500;background:#fff;border-radius:24px;box-shadow:0 8px 40px rgba(200,110,80,.28),0 2px 12px rgba(0,0,0,.10);padding:14px 22px;display:flex;align-items:center;gap:16px;min-width:320px;max-width:92vw;border:2px solid var(--peach-mid);transition:transform .38s cubic-bezier(.34,1.56,.64,1),opacity .28s;opacity:0;pointer-events:none}
.cart-bubble.visible{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.cart-bubble-icon{font-size:26px;flex-shrink:0;line-height:1}
.cart-bubble-info{flex:1;min-width:0}
.cart-bubble-count{font-size:12px;color:var(--text2);font-weight:600;letter-spacing:.02em}
.cart-bubble-total{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--peach-dark);line-height:1.1;white-space:nowrap}
.cart-bubble-devis{font-size:11px;color:var(--text3);margin-top:1px}
.cart-bubble-btn{padding:11px 20px;background:var(--peach);border:none;border-radius:14px;color:#fff;font-size:13px;font-family:var(--font-body);font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s,transform .1s;box-shadow:0 2px 8px rgba(200,110,80,.3);flex-shrink:0}
.cart-bubble-btn:hover{background:var(--peach-dark);transform:translateY(-1px)}
.cart-bubble-clear{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;border-radius:8px;transition:color .15s;flex-shrink:0;line-height:1}
.cart-bubble-clear:hover{color:var(--peach-dark)}
.main-cats{display:flex;gap:10px;flex-wrap:wrap;padding:0 24px 20px;max-width:1200px;margin:0 auto}
.main-cat-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:30px;border:2px solid var(--border2);background:#fff;color:var(--text2);font-family:var(--font-body);font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:.01em;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.main-cat-btn:hover{border-color:var(--peach);color:var(--peach-dark);background:var(--peach-light);transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,110,80,.14)}
.main-cat-btn.active{border-color:var(--peach-dark);background:var(--peach-dark);color:#fff;box-shadow:0 4px 16px rgba(200,110,80,.32)}
.main-cat-btn .cat-emoji{font-size:17px;line-height:1}
.main-cat-count{font-size:10px;background:rgba(255,255,255,.25);padding:1px 7px;border-radius:20px;font-weight:800;margin-left:2px}
.main-cat-btn:not(.active) .main-cat-count{background:var(--border);color:var(--text3)}
</style>
</head>
<body>
<header>
<div class="shop-logo">ClayCuttersDz</div>
<div class="divider"></div>
<div class="shop-tagline" style="margin-top:10px">Emporte-Pièces · Pâte Polymère & Argile</div>
</header>
<div class="filter-bar">
<input id="search-bar" type="text" placeholder="🔍 Rechercher un modèle…" oninput="filterModels()" style="flex:1;min-width:180px">
<select id="filter-tag" onchange="filterModels()"><option value="">🏷️ Toutes catégories</option></select>
<select id="sort-sel" onchange="filterModels()"><option value="default">Tri par défaut</option><option value="name-asc">Nom A→Z</option><option value="name-desc">Nom Z→A</option><option value="price-asc">Prix ↑</option><option value="price-desc">Prix ↓</option></select>
</div>
<div class="main-cats" id="main-cats">
  <button class="main-cat-btn active" id="mcat-all" onclick="setMainCat('all')"><span class="cat-emoji">✨</span>Tous<span class="main-cat-count" id="cnt-all"></span></button>
  <button class="main-cat-btn" id="mcat-cutters" onclick="setMainCat('cutters')"><span class="cat-emoji">✂️</span>Cutters<span class="main-cat-count" id="cnt-cutters"></span></button>
  <button class="main-cat-btn" id="mcat-texture" onclick="setMainCat('texture')"><span class="cat-emoji">🎨</span>Texture Tools<span class="main-cat-count" id="cnt-texture"></span></button>
  <button class="main-cat-btn" id="mcat-guides" onclick="setMainCat('guides')"><span class="cat-emoji">📐</span>Guides &amp; Stencils<span class="main-cat-count" id="cnt-guides"></span></button>
  <button class="main-cat-btn" id="mcat-autres" onclick="setMainCat('autres')"><span class="cat-emoji">🗂️</span>Autres<span class="main-cat-count" id="cnt-autres"></span></button>
</div>
<div class="selection-bar" id="selection-bar">
<span class="sel-count" id="sel-count-txt">0 modèle sélectionné</span>
<button class="btn-clear-sel" onclick="clearSelection()">× Désélectionner</button>
<button class="btn-order-sel" onclick="openMultiOrder()">📦 Commander la sélection</button>
</div>
<div class="products-grid" id="products-grid"></div>
<footer>© 2026 ClayCuttersDz · Tous droits réservés</footer>
<div class="cart-bubble" id="cart-bubble">
  <div class="cart-bubble-icon">🛒</div>
  <div class="cart-bubble-info">
    <div class="cart-bubble-count" id="bubble-count">0 article sélectionné</div>
    <div class="cart-bubble-total" id="bubble-total">0 DA</div>
    <div class="cart-bubble-devis" id="bubble-devis"></div>
  </div>
  <button class="cart-bubble-btn" onclick="openMultiOrder()">📦 Commander</button>
  <button class="cart-bubble-clear" onclick="clearSelection()" title="Vider la sélection">✕</button>
</div>
<div class="modal-overlay" id="viewer-modal">
<div class="modal">
<div class="modal-header">
<div><div class="modal-name" id="modal-model-name">Modèle</div><div id="modal-model-dims" style="font-size:12px;color:var(--text3);margin-top:2px"></div></div>
<button class="modal-close" onclick="closeViewer()">&#x2715;</button>
</div>
<canvas id="modal-canvas" style="display:none"></canvas>
<div id="modal-3d-hint" style="display:none;padding:6px 20px 4px;font-size:11px;color:var(--text3);text-align:center">🖥️ Glissez pour pivoter · Scroll pour zoomer</div>
<div class="modal-foot" id="modal-foot" style="display:none">
<div class="modal-price" id="modal-price-display"></div>
<button onclick="closeViewer()" style="padding:8px 18px;background:#fff;border:1.5px solid var(--border2);border-radius:10px;color:var(--text2);cursor:pointer;font-family:inherit;font-weight:600">Fermer</button>
</div>
<div class="order-preview-strip" id="order-preview-strip">
  <div class="order-preview-thumb" id="order-preview-thumb"><span id="order-preview-icon">🖸</span></div>
  <div class="order-preview-info">
    <div class="order-preview-name" id="order-preview-name"></div>
    <div class="order-preview-dims" id="order-preview-dims"></div>
    <div class="order-preview-price" id="order-preview-price"></div>
  </div>
  <div class="order-qty-row">
    <div class="order-qty-label">Qté</div>
    <input class="order-qty-input" type="number" id="of-qty-modal" value="1" min="1">
  </div>
</div>
<div class="order-section">
<div class="order-form" id="modal-order-form">
<div class="order-form-title">✨ Passer une commande</div>
<input type="text" id="of-nom-modal" placeholder="Votre nom *">
<input type="tel" id="of-tel-modal" placeholder="Téléphone / WhatsApp *">
<input type="text" id="of-adresse-modal" placeholder="Adresse de livraison *">
<textarea id="of-note-modal" placeholder="Note (couleur, précisions…)"></textarea>
<button class="btn-send" onclick="sendModalOrder()">📨 Envoyer via WhatsApp</button>
</div></div></div></div></div>
<div class="multi-order-modal" id="multi-order-modal">
<div class="multi-modal-box">
<div class="multi-modal-header">
<div class="multi-modal-title">📦 Commande groupée</div>
<button class="modal-close" onclick="closeMultiOrder()">&#x2715;</button>
</div>
<div class="multi-items-list" id="multi-items-list"></div>
<div class="multi-form">
<input type="text" id="multi-nom" placeholder="Votre nom *" style="width:100%;padding:9px 12px;border:1.5px solid var(--border2);border-radius:10px;font-family:var(--font-body);font-size:13px;outline:none;margin-bottom:8px;background:#fff">

var _DC={};
function getDataUrl(m){ return _DC[m.id]||null; }
function fetchModel(m){
  if(_DC[m.id]) return Promise.resolve(_DC[m.id]);
  if(!m.hasD) return Promise.resolve(null);
  var prefix=m.ext==="stl"?"data:application/octet-stream;base64,":"data:text/plain;base64,";
  return fetch(m.id+".b64").then(function(r){
    if(!r.ok) throw new Error("fetch error "+r.status);
    return r.text();
  }).then(function(b64){
    var dataUrl=prefix+b64.trim();
    _DC[m.id]=dataUrl;
    return dataUrl;
  }).catch(function(){ return null; });
}

MODELS.forEach(function(m){ if(m.tags) m.tags.forEach(function(t){ if(!allTags.includes(t)) allTags.push(t); }); });
allTags.sort();

if(tagSel){ allTags.forEach(function(t){ var o=document.createElement("option"); o.value=t; o.textContent=t; tagSel.appendChild(o); }); }

var selected=[];
var activeMainCat="all";

/* Tags belonging to each main category — used as fallback for models without mainCat */
var MAIN_CAT_TAGS={
  cutters:["Coupe-Pâte","Biscuits & Sablés","Pâtisserie & Desserts","Fondant & Sucre","Fleurs & Botaniques","Animaux & Mascottes","Lettres & Chiffres","Géométrique & Abstrait","Fêtes & Occasions","Noël & Hiver","Fruits & Légumes","Enfants & Kawaii","Nature & Feuilles","Arabesque & Oriental","Personnages & Visages","Bijoux & Pendentifs","Cœurs & Amour","Étoiles & Lunes","Halloween & Automne","Pâques & Printemps","Mariage & Romantique","Mer & Tropical"],
  texture:["Textures & Embossage"],
  guides:["Ejecteur"]
};

function modelMainCat(m){
  /* Priorité : champ mainCat défini explicitement */
  if(m.mainCat&&m.mainCat!=="") return m.mainCat;
  /* Fallback : déduction par tags */
  var tags=m.tags||[];
  if(tags.some(function(t){ return MAIN_CAT_TAGS.texture.indexOf(t)>=0; })) return "texture";
  if(tags.some(function(t){ return MAIN_CAT_TAGS.guides.indexOf(t)>=0; })) return "guides";
  if(tags.some(function(t){ return MAIN_CAT_TAGS.cutters.indexOf(t)>=0; })) return "cutters";
  return "autres";
}

function setMainCat(cat){
  activeMainCat=cat;
  ["all","cutters","texture","guides","autres"].forEach(function(c){
    var btn=document.getElementById("mcat-"+c);
    if(btn) btn.classList.toggle("active",c===cat);
  });
  filterModels();
}

function updateCatCounts(){
  var counts={all:0,cutters:0,texture:0,guides:0,autres:0};
  MODELS.forEach(function(m){ counts.all++; counts[modelMainCat(m)]++; });
  Object.keys(counts).forEach(function(k){
    var el=document.getElementById("cnt-"+k);
    if(el) el.textContent=counts[k]||"";
  });
}

function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function toggleSelect(idx,cb){
  var card=document.getElementById("pcard-"+idx);
  if(cb.checked){
    if(!selected.includes(idx)) selected.push(idx);
    if(card) card.classList.add("selected");
  } else {
    selected=selected.filter(function(i){return i!==idx;});
    if(card) card.classList.remove("selected");
  }
  updateSelectionBar();
}

function updateSelectionBar(){
  var bar=document.getElementById("selection-bar");
  var txt=document.getElementById("sel-count-txt");
  var bubble=document.getElementById("cart-bubble");
  var bubbleCount=document.getElementById("bubble-count");
  var bubbleTotal=document.getElementById("bubble-total");
  var bubbleDevis=document.getElementById("bubble-devis");
  var n=selected.length;
  if(n>0){
    bar.classList.add("visible");
    txt.textContent=n+" modèle"+(n>1?"s":"")+" sélectionné"+(n>1?"s":"");
    /* Compute totals for bubble */
    var total=0; var devisCount=0;
    selected.forEach(function(idx){
      var m=MODELS[idx]; if(!m) return;
      if(m.prix&&m.prix>0){ total+=m.prix; } else { devisCount++; }
    });
    if(bubbleCount) bubbleCount.textContent=n+" article"+(n>1?"s":"")+" sélectionné"+(n>1?"s":"");
    if(bubbleTotal){
      if(total>0){ bubbleTotal.textContent=new Intl.NumberFormat("fr-DZ").format(total)+" DA"; }
      else { bubbleTotal.textContent="Sur devis"; }
    }
    if(bubbleDevis){
      if(devisCount>0&&total>0){ bubbleDevis.textContent="+ "+devisCount+" article"+(devisCount>1?"s":"")+" sur devis"; }
      else if(devisCount>0&&total===0){ bubbleDevis.textContent=""; }
      else { bubbleDevis.textContent=""; }
    }
    if(bubble) bubble.classList.add("visible");
  } else {
    bar.classList.remove("visible");
    if(bubble) bubble.classList.remove("visible");
  }
}

function clearSelection(){
  selected=[];
  document.querySelectorAll(".card-checkbox").forEach(function(cb){ cb.checked=false; });
  document.querySelectorAll(".product-card").forEach(function(c){ c.classList.remove("selected"); });
  updateSelectionBar();
}

/* ── renderMiniThumb : rend un snapshot 3D dans un canvas de taille arbitraire ── */
function renderMiniThumb(m,canvasId,w,h){
  fetchGeo(m).then(function(geo){
  var c=document.getElementById(canvasId); if(!c||!geo) return;
  initSharedRenderer();
  var r=geo.boundingSphere.radius;
  var ang=30*Math.PI/180;
  var q=new THREE.Quaternion(); q.setFromAxisAngle(new THREE.Vector3(0,1,0),ang);
  _smesh.geometry=geo; _smesh.quaternion.copy(q);
  _sc2.position.set(0,0,r*2.8); _sc2.lookAt(0,0,0);
  _sc2.aspect=SR_W/SR_H; _sc2.updateProjectionMatrix();
  _sr.render(_ss,_sc2);
  var ctx=c.getContext("2d");
  if(ctx){ ctx.clearRect(0,0,w,h); ctx.drawImage(_sr.domElement,0,0,SR_W,SR_H,0,0,w,h); }
  });
}

function openMultiOrder(){
  var list=document.getElementById("multi-items-list");
  var html="";
  selected.forEach(function(idx){
    var m=MODELS[idx];
    if(!m) return;
    var pr=m.prix?new Intl.NumberFormat("fr-DZ").format(m.prix)+" DA":"Sur devis";
    var hasD=!!(m.hasD&&(m.ext==="stl"||m.ext==="obj"));
    var thumbHtml=hasD
      ?'<canvas id="mthumb-'+idx+'" width="54" height="54"></canvas>'
      :'🖨️';
    html+='<div class="multi-item-row">';
    html+='<div class="multi-item-thumb">'+thumbHtml+'</div>';
    html+='<div class="multi-item-info"><div class="multi-item-name">'+escH(m.name)+'</div><div class="multi-item-price">'+pr+'</div></div>';
    html+='<input class="multi-item-qty" type="number" id="mqty-'+idx+'" value="1" min="1">';
    html+='</div>';
  });
  list.innerHTML=html;
  /* Render mini thumbs after DOM insertion */
  setTimeout(function(){
    selected.forEach(function(idx){
      var m=MODELS[idx]; if(!m||!m.hasD) return;
      renderMiniThumb(m,"mthumb-"+idx,54,54);
    });
  },40);
  document.getElementById("multi-order-modal").classList.add("open");
}

function closeMultiOrder(){
  document.getElementById("multi-order-modal").classList.remove("open");
}

function renderPagination(){

  bar.id="pagination-bar";
  bar.style.cssText="display:flex;align-items:center;justify-content:center;gap:8px;padding:28px 24px 40px;flex-wrap:wrap";
  var start=currentPage*PAGE_SIZE+1;
  var end=Math.min(start+PAGE_SIZE-1,total);
  var info=document.createElement("span");
  info.style.cssText="font-size:12px;color:var(--text2);margin-right:8px";
  info.textContent=start+"–"+end+" sur "+total+" modèles";

  prev.disabled=currentPage===0;
  if(currentPage===0) prev.style.opacity="0.38";
  prev.onclick=function(){ if(currentPage>0){ currentPage--; renderPage(); } };
  bar.appendChild(prev);
  /* Page number buttons */
  var maxBtns=5;
  var halfB=Math.floor(maxBtns/2);
  var startP=Math.max(0,currentPage-halfB);
  var endP=Math.min(totalPages-1,startP+maxBtns-1);
  if(endP-startP<maxBtns-1) startP=Math.max(0,endP-maxBtns+1);
  for(var p=startP;p<=endP;p++){
    (function(pg){
      var btn=document.createElement("button");
      btn.textContent=pg+1;
      var isActive=pg===currentPage;
      btn.style.cssText="width:38px;height:38px;border-radius:50%;border:2px solid "+(isActive?"var(--peach-dark)":"var(--border2)")+";background:"+(isActive?"var(--peach-dark)":"#fff")+";color:"+(isActive?"#fff":"var(--text2)")+";font-family:var(--font-body);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s";
      btn.onclick=function(){ currentPage=pg; renderPage(); };
      bar.appendChild(btn);
    })(p);
  }
  /* Next button */
  var next=document.createElement("button");
  next.textContent="Suivant →";
  next.style.cssText="padding:9px 18px;border-radius:24px;border:2px solid var(--border2);background:#fff;color:var(--text2);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s";
  next.disabled=currentPage>=totalPages-1;
  if(currentPage>=totalPages-1) next.style.opacity="0.38";
  next.onclick=function(){ if(currentPage<totalPages-1){ currentPage++; renderPage(); } };
  bar.appendChild(next);

  var footer=document.querySelector("footer");
  if(footer) footer.parentNode.insertBefore(bar,footer);
  else document.body.appendChild(bar);
}

/* ── LRU GEOMETRY CACHE — max 20 géométries en RAM simultanément ── */
var GEO_LRU_MAX=20;
var _geoCache={}; /* id → {geo, lruTime} */
var _geoCacheOrder=[]; /* ids dans l'ordre d'accès */

function _evictGeoCache(){
  while(_geoCacheOrder.length>GEO_LRU_MAX){
    var evictId=_geoCacheOrder.shift();
    if(_geoCache[evictId]){
      try{ _geoCache[evictId].geo.dispose(); }catch(e){}
      delete _geoCache[evictId];
    }
  }
}

/* loadGeo synchrone — lit le cache LRU uniquement (déjà fetché) */
function loadGeo(m){
  if(_geoCache[m.id]){
    _geoCache[m.id].lruTime=Date.now();
    var idx=_geoCacheOrder.indexOf(m.id);
    if(idx>=0) _geoCacheOrder.splice(idx,1);
    _geoCacheOrder.push(m.id);
    return _geoCache[m.id].geo;
  }
  return null;
}

/* _parseGeo — parse une dataUrl en géométrie Three.js */
function _parseGeo(m, dataUrl){
  try{
    var geo=null;
    if(m.ext==="stl"){
      var bin=atob(dataUrl.split(",")[1]);
      var bytes=new Uint8Array(bin.length);
      for(var k=0;k<bin.length;k++) bytes[k]=bin.charCodeAt(k);
      geo=new THREE.STLLoader().parse(bytes.buffer);
    } else if(m.ext==="obj"){
      var text=decodeURIComponent(escape(atob(dataUrl.split(",")[1])));
      var obj=new THREE.OBJLoader().parse(text); geo=obj.children[0]?obj.children[0].geometry:null;
    }
    if(geo){
      geo.center(); geo.computeBoundingBox(); geo.computeBoundingSphere();
      var bb0=geo.boundingBox;
      if((bb0.max.z-bb0.min.z)>(bb0.max.y-bb0.min.y)*1.2){
        geo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI/2));
        geo.center(); geo.computeBoundingBox(); geo.computeBoundingSphere();
      }
      _geoCache[m.id]={geo:geo, lruTime:Date.now()};
      _geoCacheOrder.push(m.id);
      _evictGeoCache();
    }
    return geo;
  }catch(e){return null;}
}

/* fetchGeo — charge le .b64 si besoin, parse, retourne une Promise<geo|null> */
function fetchGeo(m){
  var cached=loadGeo(m); if(cached) return Promise.resolve(cached);
  return fetchModel(m).then(function(dataUrl){
    if(!dataUrl) return null;
    return _parseGeo(m, dataUrl);
  });
}

/* ── SHARED RENDERER — taille fixe 280×190, jamais redimensionné ── */
var SR_W=280, SR_H=190;
var _sr=null, _ss=null, _sc2=null, _smesh=null, _smat=null;
function initSharedRenderer(){
  if(_sr) return;
  var off=document.createElement("canvas");
  off.width=SR_W; off.height=SR_H;
  _ss=new THREE.Scene();
  _sc2=new THREE.PerspectiveCamera(45,SR_W/SR_H,0.1,1000);
  _sr=new THREE.WebGLRenderer({canvas:off,antialias:true,alpha:true,preserveDrawingBuffer:true});
  _sr.setClearColor(0x000000,0);
  _sr.setPixelRatio(1);
  _sr.setSize(SR_W,SR_H,false);
  _ss.add(new THREE.AmbientLight(0xffffff,.8));
  var dl=new THREE.DirectionalLight(0xffffff,1.2); dl.position.set(5,10,7); _ss.add(dl);
  var dl2=new THREE.DirectionalLight(0xffe8d0,.4); dl2.position.set(-5,-5,-5); _ss.add(dl2);
  _smat=new THREE.MeshStandardMaterial({color:0xe8845a,metalness:0,roughness:.5});
  _smesh=new THREE.Mesh(new THREE.BufferGeometry(),_smat);
  _ss.add(_smesh);
}

/* Per-card state + registered window listeners for cleanup */
var cardInstances=[];
var _windowListeners=[]; /* [{move,up,id}] — nettoyés au changement de page */

function _cleanupWindowListeners(){
  _windowListeners.forEach(function(l){
    window.removeEventListener("mousemove",l.move);
    window.removeEventListener("mouseup",l.up);
  });
  _windowListeners=[];
}

function renderCardSnapshot(i){
  var inst=cardInstances[i]; if(!inst||!inst.geo) return;
  /* Vérifier que la géo est toujours dans le cache */
  if(!_geoCache[inst.modelId]){
    fetchGeo(inst.model).then(function(g){ if(g){ inst.geo=g; renderCardSnapshot(i); } });
    return;
  }
  initSharedRenderer();
  _smesh.geometry=inst.geo;
  _smesh.quaternion.copy(inst.quat);
  _sc2.position.set(0,0,inst.dist); _sc2.lookAt(0,0,0);
  _sc2.aspect=SR_W/SR_H; _sc2.updateProjectionMatrix();
  _sr.render(_ss,_sc2);
  var ctx=inst.canvas.getContext("2d");
  if(ctx){
    var cw=inst.canvas.width, ch=inst.canvas.height;
    ctx.clearRect(0,0,cw,ch);
    ctx.drawImage(_sr.domElement,0,0,SR_W,SR_H,0,0,cw,ch);
  }
}

function initCardViewer(i,m){
  var canvas=document.getElementById("pcanvas-"+i);
  if(!canvas||!m.hasD) return;
  var obs=new IntersectionObserver(function(entries,ob){
    if(!entries[0].isIntersecting) return;
    ob.disconnect();
    fetchGeo(m).then(function(geo){
    if(!geo){ return; }
    var r=geo.boundingSphere.radius;
    var ang30=30*Math.PI/180;
    var initQuat=new THREE.Quaternion(); initQuat.setFromAxisAngle(new THREE.Vector3(0,1,0), ang30);
    cardInstances[i]={geo:geo, model:m, modelId:m.id, quat:initQuat.clone(), dist:r*2.8, canvas:canvas};
    renderCardSnapshot(i);
    /* ── Drag-to-rotate ── */
    var dragState={active:false, lastX:0, lastY:0};
    function onDragStart(ex,ey){
      dragState.active=true; dragState.lastX=ex; dragState.lastY=ey;
      canvas.style.cursor="grabbing";
    }
    function onMove(e){
      if(!dragState.active) return;
      var ex=e.clientX, ey=e.clientY;
      var dx=ex-dragState.lastX, dy=ey-dragState.lastY;
      dragState.lastX=ex; dragState.lastY=ey;
      var speed=0.008;
      var qY=new THREE.Quaternion(); qY.setFromAxisAngle(new THREE.Vector3(0,1,0), dx*speed);
      var qX=new THREE.Quaternion(); qX.setFromAxisAngle(new THREE.Vector3(1,0,0), dy*speed);
      if(cardInstances[i]){ cardInstances[i].quat.premultiply(qY).premultiply(qX); renderCardSnapshot(i); }
    }
    function onUp(){ dragState.active=false; canvas.style.cursor="grab"; }
    canvas.addEventListener("mousedown",function(e){ e.preventDefault(); onDragStart(e.clientX,e.clientY); });
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    /* Enregistrer pour nettoyage ultérieur */
    _windowListeners.push({move:onMove, up:onUp, id:i});
    /* Touch */
    canvas.addEventListener("touchstart",function(e){ if(e.touches.length===1){ e.preventDefault(); onDragStart(e.touches[0].clientX,e.touches[0].clientY); } },{passive:false});
    canvas.addEventListener("touchmove",function(e){ if(e.touches.length===1){ e.preventDefault(); onMove({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}); } },{passive:false});
    canvas.addEventListener("touchend",function(){ onUp(); });
    canvas.style.cursor="grab";
  });
  },{threshold:0.1});
  obs.observe(canvas);
}
